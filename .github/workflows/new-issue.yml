name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Set up Android SDK (API 33, build-tools)
      uses: r0adkll/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build APKs (debug + release unsigned)
      run: ./gradlew assembleDebug assembleRelease --no-daemon

    - name: Sign release APK (if keystore provided)
      if: ${{ secrets.ANDROID_KEYSTORE != '' }}
      env:
        ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        BUILD_TOOLS_VERSION: 33.0.2
      run: |
        set -e
        echo "Decoding keystore..."
        mkdir -p keystore
        echo "$ANDROID_KEYSTORE" | base64 --decode > keystore/release.keystore

        unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
        aligned_apk="app/build/outputs/apk/release/app-release-unsigned-aligned.apk"
        signed_apk="app/build/outputs/apk/release/app-release-signed.apk"

        if [ -f "$unsigned_apk" ]; then
          echo "Aligning unsigned APK..."
          "$ANDROID_HOME"/build-tools/"$BUILD_TOOLS_VERSION"/zipalign -v -p 4 "$unsigned_apk" "$aligned_apk"
          echo "Signing aligned APK..."
          "$ANDROID_HOME"/build-tools/"$BUILD_TOOLS_VERSION"/apksigner sign \
            --ks keystore/release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out "$signed_apk" "$aligned_apk"
          echo "Signed APK created: $signed_apk"
        else
          echo "Unsigned release APK not found: $unsigned_apk"
          exit 1
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK (signed if present, else unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: |
          app/build/outputs/apk/release/app-release-signed.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
