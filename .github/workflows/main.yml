name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Create and configure buildozer.spec
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        sed -i 's/^title = .*/title = تطبيقي/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = myapp/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = com.example/' buildozer.spec
        sed -i 's/^android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
        sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/^android.ndk = .*/android.ndk = 25b/' buildozer.spec
        sed -i 's/^android.sdk = .*/android.sdk = 33/' buildozer.spec

    - name: Create Android licenses
      run: |
        mkdir -p ~/.android
        cat > ~/.android/licenses/android-sdk-license << 'EOF'
        8933bad161af4178b1185d1a37fbf41ea5269c55
        d56f5187479451eabf01fb78af6dfcb131a6481e
        84831b9409646a918e30573bab4c9c91346d8abd
        EOF
        cat > ~/.android/licenses/android-sdk-preview-license << 'EOF'
        84831b9409646a918e30573bab4c9c91346d8abd
        EOF
        cat > ~/.android/licenses/google-gdk-license << 'EOF'
        33b6a2b64607f11b759f320ef9dff4ae5c47d97a
        EOF

    - name: Download and install Android SDK build-tools manually
      run: |
        # تثبيت SDK
        mkdir -p ~/.buildozer/android/platform
        cd ~/.buildozer/android/platform
        
        # تنزيل sdkmanager
        if [ ! -d "android-sdk" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
        fi
        
        # تنزيل build-tools يدوياً
        cd ~/.buildozer/android/platform/android-sdk
        mkdir -p build-tools
        cd build-tools
        
        # تنزيل build-tools 37.0.0
        wget -q https://dl.google.com/android/repository/build-tools_r37-linux.zip
        unzip -q build-tools_r37-linux.zip
        mv build-tools 37.0.0
        
        # إضافة aapt2
        cd 37.0.0
        chmod +x *

    - name: Build APK
      run: |
        export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_HOME/build-tools/37.0.0:$PATH
        buildozer -v android debug deploy run

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: warn
